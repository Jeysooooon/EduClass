{% extends 'base.html' %}
{% block title %}Agregar Docente | EduClass{% endblock %}
{% block content %}
<section class="form-card">
    <div class="form-card__header">
        <p class="panel-chip">Nuevo registro</p>
        <h2 class="section-title mb-1">Agregar docente</h2>
        <p class="section-copy mb-0">Esta entidad sigue usando consultas SQL directas dentro de su Blueprint.</p>
    </div>
    <form method="POST" class="row g-3">
        <div class="col-md-6">
            <label class="form-label">Nombre</label>
            <input type="text" name="DocNombre" class="form-control" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Apellido</label>
            <input type="text" name="DocApellido" class="form-control" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Especialidad</label>
            <input type="text" name="DocEspecialidad" class="form-control" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Telefono</label>
            <input type="text" name="DocTelefono" class="form-control">
        </div>
        <div class="col-12 d-flex flex-wrap gap-2 pt-2">
            <button type="submit" class="btn btn-brand">
                <i class="bi bi-check2-circle"></i> Guardar
            </button>
            <a href="{{ url_for('docente.index') }}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
    </form>
</section>
{% endblock %}
