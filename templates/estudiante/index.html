{% extends 'base.html' %}
{% block content %}
<h2>Listado de Estudiantes</h2>
<a href="{{ url_for('estudiante_agregar') }}" class="btn btn-primary mb-3">Agregar Estudiante</a>
<table class="table table-striped table-bordered shadow-sm bg-white">
    <thead class="table-dark">
        <tr>
            <th>Código</th><th>Nombre</th><th>Apellido</th><th>DNI</th><th>Correo</th><th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for e in lista_estudiantes %}
        <tr>
            <td>{{ e.EstCodigo }}</td><td>{{ e.EstNombre }}</td><td>{{ e.EstApellido }}</td><td>{{ e.EstDNI }}</td><td>{{ e.EstCorreo }}</td>
            <td>
                <a href="{{ url_for('estudiante_editar', codigo=e.EstCodigo) }}" class="btn btn-sm btn-warning">Editar</a>
                <a href="{{ url_for('estudiante_eliminar', codigo=e.EstCodigo) }}" class="btn btn-sm btn-danger">Eliminar</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
