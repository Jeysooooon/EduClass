{% extends 'base.html' %}
{% block title %}Agregar Estudiante | EduClass{% endblock %}
{% block content %}
<section class="form-card">
    <div class="form-card__header">
        <p class="panel-chip">Nuevo registro</p>
        <h2 class="section-title mb-1">Agregar estudiante</h2>
        <p class="section-copy mb-0">Los datos se guardan usando el modelo ORM <code>Estudiante</code>.</p>
    </div>
    <form method="POST" class="row g-3">
        <div class="col-md-6">
            <label class="form-label">Nombre</label>
            <input type="text" name="EstNombre" class="form-control" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Apellido</label>
            <input type="text" name="EstApellido" class="form-control" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">DNI</label>
            <input type="text" name="EstDNI" class="form-control" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Correo</label>
            <input type="email" name="EstCorreo" class="form-control">
        </div>
        <div class="col-12 d-flex flex-wrap gap-2 pt-2">
            <button type="submit" class="btn btn-brand">
                <i class="bi bi-check2-circle"></i> Guardar
            </button>
            <a href="{{ url_for('estudiante.index') }}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
    </form>
</section>
{% endblock %}
