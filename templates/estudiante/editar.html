{% extends 'base.html' %}
{% block title %}Editar Estudiante | EduClass{% endblock %}
{% block content %}
<section class="form-card">
    <div class="form-card__header">
        <p class="panel-chip">Edicion</p>
        <h2 class="section-title mb-1">Editar estudiante</h2>
        <p class="section-copy mb-0">Actualiza la informacion del estudiante con codigo {{ estudiante.EstCodigo }}.</p>
    </div>
    <form method="POST" class="row g-3">
        <div class="col-md-6">
            <label class="form-label">Nombre</label>
            <input type="text" name="EstNombre" class="form-control" value="{{ estudiante.EstNombre }}" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Apellido</label>
            <input type="text" name="EstApellido" class="form-control" value="{{ estudiante.EstApellido }}" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">DNI</label>
            <input type="text" name="EstDNI" class="form-control" value="{{ estudiante.EstDNI }}" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Correo</label>
            <input type="email" name="EstCorreo" class="form-control" value="{{ estudiante.EstCorreo or '' }}">
        </div>
        <div class="col-12 d-flex flex-wrap gap-2 pt-2">
            <button type="submit" class="btn btn-brand">
                <i class="bi bi-arrow-repeat"></i> Actualizar
            </button>
            <a href="{{ url_for('estudiante.index') }}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
    </form>
</section>
{% endblock %}
