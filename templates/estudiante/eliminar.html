{% extends 'base.html' %}
{% block title %}Eliminar Estudiante | EduClass{% endblock %}
{% block content %}
<section class="danger-card">
    <div class="danger-card__icon">
        <i class="bi bi-exclamation-triangle-fill"></i>
    </div>
    <div>
        <p class="panel-chip panel-chip--danger">Confirmacion</p>
        <h2 class="section-title">Eliminar estudiante</h2>
        <p class="section-copy">
            Vas a eliminar a <strong>{{ estudiante.EstNombre }} {{ estudiante.EstApellido }}</strong>.
            Esta accion no se puede deshacer.
        </p>
        <form method="POST" class="d-flex flex-wrap gap-2 mt-4">
            <button type="submit" class="btn btn-danger">
                <i class="bi bi-trash3-fill"></i> Si, eliminar
            </button>
            <a href="{{ url_for('estudiante.index') }}" class="btn btn-outline-secondary">Cancelar</a>
        </form>
    </div>
</section>
{% endblock %}
