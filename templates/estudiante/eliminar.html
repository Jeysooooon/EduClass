{% extends 'base.html' %}
{% block content %}
<div class="alert alert-danger shadow-sm">
    <h4>¿Estás seguro de eliminar a {{ estudiante.EstNombre }} {{ estudiante.EstApellido }}?</h4>
    <p>Esta acción no se puede deshacer.</p>
    <form method="POST">
        <button type="submit" class="btn btn-danger">Sí, Eliminar</button>
        <a href="{{ url_for('estudiante_index') }}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
